<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MICH BOX - Tienda Online</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
}

header{
background:#0d6efd;
color:white;
padding:20px;
text-align:center;
}

header h1{
font-size:32px;
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.producto{
background:white;
border-radius:15px;
padding:15px;
box-shadow:0 0 10px rgba(0,0,0,.1);
text-align:center;
}

.producto img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.producto h3{
margin:10px 0;
}

.precio{
font-size:22px;
color:#0d6efd;
font-weight:bold;
}

button{
background:#0d6efd;
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#084298;
}

.carrito{
position:fixed;
top:20px;
right:20px;
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.2);
width:320px;
max-height:500px;
overflow:auto;
}

.carrito h2{
margin-bottom:10px;
}

.item{
margin-bottom:10px;
border-bottom:1px solid #ddd;
padding-bottom:5px;
}

.total{
font-size:22px;
font-weight:bold;
margin:15px 0;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:1px solid #ccc;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<h1>MICH BOX</h1>
<p>Tecnología y Accesorios</p>
</header>

<div class="productos">

<div class="producto">
<img src="https://via.placeholder.com/300x220">
<h3>Xiaomi Sound Pocket</h3>
<p class="precio">S/ 99</p>
<button onclick="agregar('Xiaomi Sound Pocket',99)">
Agregar al carrito
</button>
</div>

<div class="producto">
<img src="https://via.placeholder.com/300x220">
<h3>LIDIMI LD-S004AC</h3>
<p class="precio">S/ 89</p>
<button onclick="agregar('LIDIMI LD-S004AC',89)">
Agregar al carrito
</button>
</div>

<div class="producto">
<img src="https://via.placeholder.com/300x220">
<h3>BUYTITI CH-M233</h3>
<p class="precio">S/ 75</p>
<button onclick="agregar('BUYTITI CH-M233',75)">
Agregar al carrito
</button>
</div>

</div>

<div class="carrito">

<h2>🛒 Carrito</h2>

<div id="lista"></div>

<div class="total">
Total: S/ <span id="total">0</span>
</div>

<input type="text" id="nombre" placeholder="Nombre">

<input type="text" id="direccion" placeholder="Dirección">

<input type="email" id="correo" placeholder="Correo">

<button onclick="enviarWhatsapp()">
Finalizar Pedido
</button>

</div>

<script>

let carrito=[];

function agregar(nombre,precio){

carrito.push({
nombre:nombre,
precio:precio
});

mostrar();

}

function mostrar(){

let lista=document.getElementById("lista");
lista.innerHTML="";

let total=0;

carrito.forEach((item,index)=>{

total+=item.precio;

lista.innerHTML+=`
<div class="item">
${item.nombre}
- S/${item.precio}
</div>
`;

});

document.getElementById("total").innerText=total;

}

function enviarWhatsapp(){

let nombre=document.getElementById("nombre").value;
let direccion=document.getElementById("direccion").value;
let correo=document.getElementById("correo").value;

if(carrito.length===0){

alert("Agrega productos al carrito");

return;

}

let mensaje="*PEDIDO MICH BOX*%0A%0A";

carrito.forEach(item=>{

mensaje+=`• ${item.nombre} - S/${item.precio}%0A`;

});

let total=document.getElementById("total").innerText;

mensaje+=`%0ATotal: S/${total}%0A`;
mensaje+=`Nombre: ${nombre}%0A`;
mensaje+=`Dirección: ${direccion}%0A`;
mensaje+=`Correo: ${correo}`;

window.open(
`https://wa.me/51926528057?text=${mensaje}`,
'_blank'
);

}

</script>

</body>
</html>
